services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: event_db
    restart: "no"
    environment:
      POSTGRES_DB:       eventdb
      POSTGRES_USER:     eventuser
      POSTGRES_PASSWORD: eventpass
    ports:
      - "5432:5432"          # 로컬에서 psql / DBeaver로 직접 접속 가능
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventuser -d eventdb"]
      interval: 3s
      timeout: 5s
      retries: 10

  # ── 이벤트 생성 + 분석 + 시각화 ──────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: event_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     eventdb
      DB_USER:     eventuser
      DB_PASSWORD: eventpass
      N_EVENTS:    "5000"      # 생성할 이벤트 수 (변경 가능)
      SPREAD_HOURS: "24"       # 이벤트가 분산될 시간 범위
      CHARTS_DIR:  /charts
    volumes:
      - ./charts:/charts       # 호스트 ./charts 폴더에 PNG 파일 저장
    restart: "no"

volumes:
  pgdata:
